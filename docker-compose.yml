services:
  videoforge:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persistent data
      - ./data:/app/data
      - ./projects:/app/projects
      - ./config/channels:/app/config/channels
      - ./prompts:/app/prompts
      # Transcriber output (read-only mount)
      - ${TRANSCRIBER_OUTPUT_DIR:-/mnt/transcriber}:/mnt/transcriber:ro
    env_file:
      - .env
    environment:
      # Override for container paths
      TRANSCRIBER_OUTPUT_DIR: /mnt/transcriber
    restart: unless-stopped

  # Dev-only: hot-reload frontend + backend separately
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["dev"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/frontend/node_modules
    env_file:
      - .env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend-dev:
    image: node:20-alpine
    profiles: ["dev"]
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm ci --silent && npm run dev -- --host"
    environment:
      VITE_API_BASE: http://backend-dev:8000
