name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt

      - name: Run tests
        env:
          VOIDAI_API_KEY: test-key
          WAVESPEED_API_KEY: test-key
          VOICEAPI_KEY: test-key
        run: |
          python -m pytest tests/ -v --tb=short --cov=modules --cov=clients --cov-report=term-missing

      - name: Lint check
        run: |
          python -m py_compile pipeline.py
          python -m py_compile backend/main.py
          for f in modules/*.py; do python -m py_compile "$f"; done
          for f in clients/*.py; do python -m py_compile "$f"; done
